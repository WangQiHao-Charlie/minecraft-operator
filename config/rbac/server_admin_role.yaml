# This rule is not used by the project minecraft-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over minecraft.charlie-cloud.me.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: minecraft-operator
    app.kubernetes.io/managed-by: kustomize
  name: server-admin-role
rules:
- apiGroups:
  - minecraft.charlie-cloud.me
  resources:
  - servers
  verbs:
  - '*'
- apiGroups:
  - minecraft.charlie-cloud.me
  resources:
  - servers/status
  verbs:
  - get
