apiVersion: minecraft.charlie-cloud.me/v1
kind: Server
metadata:
  labels:
    app.kubernetes.io/name: minecraft-operator
    app.kubernetes.io/managed-by: kustomize
  name: server-sample
spec:
  hardware:
    storage_size: 10
    memory_size: 2048
    cpu_count: 1000
    storage_class: standard
  java_version: "21"
  minecraft:
    eula: "TRUE"
    type: PAPER
    version: "1.21.1"
    motd: "server-sample"
  debug:
    enabled: false
